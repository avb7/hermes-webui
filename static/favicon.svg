<?xml version="1.0" encoding="UTF-8"?>
<!-- Hermes WebUI favicon — RGB-chromatic-aberration tesseract.
     Two nested cubes (outer + inner) drawn in 1-point perspective,
     connected at corresponding vertices to form a 4D hypercube
     Schlegel projection. The geometry is defined once in <defs>
     and rendered three times with small offsets in red/green/blue
     to produce the chromatic-aberration look. Scales crisply from
     16px (browser tab) up to 1024px (PWA splash) without rasterizing.
     viewBox: 0 0 100 100, square 1:1 for icon use. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"
     preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Single tesseract path: 32 line segments. outer front 70x70,
         outer back 44x44, inner front 20x20, inner back 10x10. All
         four squares share the center (50,50). Connectors fan
         outward in pairs. -->
    <g id="hc-tesseract" fill="none" stroke-width="1.6"
       stroke-linecap="round" stroke-linejoin="round">
      <!-- outer cube: front square + back square + 4 connectors -->
      <rect x="15" y="15" width="70" height="70"/>
      <rect x="28" y="28" width="44" height="44"/>
      <line x1="15" y1="15" x2="28" y2="28"/>
      <line x1="85" y1="15" x2="72" y2="28"/>
      <line x1="85" y1="85" x2="72" y2="72"/>
      <line x1="15" y1="85" x2="28" y2="72"/>
      <!-- inner cube: front square + back square + 4 connectors -->
      <rect x="40" y="40" width="20" height="20"/>
      <rect x="45" y="45" width="10" height="10"/>
      <line x1="40" y1="40" x2="45" y2="45"/>
      <line x1="60" y1="40" x2="55" y2="45"/>
      <line x1="60" y1="60" x2="55" y2="55"/>
      <line x1="40" y1="60" x2="45" y2="55"/>
      <!-- 4D bridges: outer-front → inner-front (4 lines) -->
      <line x1="15" y1="15" x2="40" y2="40"/>
      <line x1="85" y1="15" x2="60" y2="40"/>
      <line x1="85" y1="85" x2="60" y2="60"/>
      <line x1="15" y1="85" x2="40" y2="60"/>
      <!-- 4D bridges: outer-back → inner-back (4 lines) -->
      <line x1="28" y1="28" x2="45" y2="45"/>
      <line x1="72" y1="28" x2="55" y2="45"/>
      <line x1="72" y1="72" x2="55" y2="55"/>
      <line x1="28" y1="72" x2="45" y2="55"/>
    </g>
  </defs>
  <!-- Background: dark navy, rounded corners for native PWA look -->
  <rect width="100" height="100" rx="18" ry="18" fill="#0a0d18"/>
  <!-- Three offset color channels. mix-blend-mode:screen composites
       overlapping strokes to near-white where all three align,
       leaving colored fringes at the offset edges — the classic
       chromatic-aberration glitch look. Channels picked to read as
       distinct hues at small sizes but blend cleanly when they
       overlap. -->
  <g style="mix-blend-mode: screen">
    <use href="#hc-tesseract" stroke="#ff3a64"
         transform="translate(-1.1,-0.6)"/>
    <use href="#hc-tesseract" stroke="#4ade80"/>
    <use href="#hc-tesseract" stroke="#38bdf8"
         transform="translate(1.1,0.6)"/>
  </g>
</svg>
